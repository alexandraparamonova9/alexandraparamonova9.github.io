# ============================================
#  MkDocs Configuration — Premium Portfolio
#  Alexandra Paramonova · P3122
# ============================================

site_name: Александра Парамонова
site_description: Премиальное портфолио лабораторных работ по веб-разработке и машинному обучению
site_author: Александра Парамонова
site_url: https://alexandraparamonova9.github.io

# ВАЖНО: use_directory_urls включает красивые URL (/lab4/ вместо /lab4.md)
use_directory_urls: true

repo_name: alexandraparamonova9/portfolio
repo_url: https://github.com/alexandraparamonova9/alexandraparamonova9.github.io

theme:
  name: material
  language: ru

  icon:
    logo: material/code-json
    repo: fontawesome/brands/github

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Переключить на тёмную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Переключить на светлую тему

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - css/custom.css

extra_javascript:
  - js/custom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: ru
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      locale: ru

# ========== ПРАВИЛЬНАЯ НАВИГАЦИЯ ==========
nav:
  - Главная: index.md
  - Обо мне: about.md
  - Лабораторные работы:
      - Лабораторная №1: labs/lab1.md
      - Лабораторная №2: labs/lab2.md
      - Лабораторная №3: labs/lab3.md
      - Лабораторная №4: labs/lab4.md
      - Лабораторная №5: labs/lab5.md
      - Лабораторная №6: labs/lab6.md
      - Лабораторная №7: labs/lab7.md
      - Лабораторная №8: labs/lab8.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alexandraparamonova9
      name: GitHub
    - icon: fontawesome/brands/telegram
      link: https://t.me/aleqxji
      name: Telegram
    - icon: fontawesome/solid/envelope
      link: mailto:mailParamonova@yandex.ru
      name: Email

  generator: false

copyright: © 2026 Александра Парамонова · P3122