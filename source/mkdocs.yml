# Настройки сайта
site_name: Александра Парамонова · P3122
site_description: Портфолио лабораторных работ по веб-разработке
site_author: Александра Парамонова
site_url: https://alexandraparamonova9.github.io

# Репозиторий
repo_name: alexandraparamonova9/alexandraparamonova9.github.io
repo_url: https://github.com/alexandraparamonova9/alexandraparamonova9.github.io

# Тема Material с кастомизацией
theme:
  name: material
  language: ru
  icon:
    logo: material/code-brackets
    repo: fontawesome/brands/github

  # Палитра цветов — меняем на futuristic
  palette:
    # Тёмная тема (основная)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Переключить на светлую тему

    # Светлая тема
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Переключить на тёмную тему

  # Шрифты
  font:
    text: Inter
    code: JetBrains Mono

  # Фичи
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - announce.dismiss
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress

# Дополнительные стили и скрипты — ВАЖНО!
extra_css:
  - css/custom.css
  - https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap
  - https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap

extra_javascript:
  - https://unpkg.com/feather-icons
  - https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js

# Расширения Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - footnotes
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

# Навигация — обновляем путь к лабам
nav:
  - Главная: index.md
  - Обо мне: about.md
  - Лабораторные работы:
      - Лабораторная работа №1: lab1.md
      - Лабораторная работа №2: lab2.md
      - Лабораторная работа №3: lab3.md
      - Лабораторная работа №4: lab4.md
      - Лабораторная работа №5: lab5.md
      - Лабораторная работа №6: lab6.md
      - Лабораторная работа №7: lab7.md
      - Лабораторная работа №8: lab8.md

# Плагины
plugins:
  - search:
      lang: ru
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true

# Дополнительные настройки
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alexandraparamonova9
    - icon: fontawesome/brands/telegram
      link: https://t.me/aleqxji
    - icon: fontawesome/solid/envelope
      link: mailto:mailParamonova@yandex.ru

  generator: false

# Копирайт
copyright: Copyright &copy; 2026 Александра Парамонова